name: dawakti
description: "دعواتي — تطبيق إدارة العائلة والمناسبات والمدعوين والمهام"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Local database (plain sqflite, no code generation required)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.3.1

  # Media
  image_picker: ^1.1.2

  # Communication
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  # Export / Import
  excel: ^4.0.3
  pdf: ^3.11.0
  printing: ^5.13.1
  file_picker: ^8.0.7

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Misc
  intl: ^0.20.2
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true # enables flutter gen-l10n from l10n.yaml automatically at build time

  assets:
    - assets/images/

  # NOTE: Arabic typography (Cairo/Tajawal) is loaded at runtime via the
  # google_fonts package (see core/theme/app_theme.dart) instead of being
  # bundled as raw .ttf assets here. If you prefer fully offline fonts with
  # no network fetch on first launch, download the Cairo font family and
  # register it here under a `fonts:` section, then switch app_theme.dart
  # to use `fontFamily: 'Cairo'` instead of `GoogleFonts.cairoTextTheme()`.
